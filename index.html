<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Tučniačik na Ľade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Background Layer with Ice Floes -->
        <div id="bg-layer">
            <div class="ice-floe flex-1"></div>
            <div class="ice-floe flex-2"></div>
            <div class="ice-floe flex-3"></div>
            <div class="ice-floe flex-4"></div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <div class="menu-content">
                <div class="menu-icon">
                    <svg viewBox="0 0 100 100" class="svg-penguin hero-svg" style="--skin-color: #FFCA28;">
                        <ellipse cx="30" cy="90" rx="15" ry="8" fill="#FF9800"/>
                        <ellipse cx="70" cy="90" rx="15" ry="8" fill="#FF9800"/>
                        <ellipse cx="50" cy="55" rx="40" ry="45" fill="var(--skin-color)"/>
                        <ellipse cx="50" cy="65" rx="30" ry="30" fill="#FFF"/>
                        <!-- Zombie Survival Gear -->
                        <g class="zombie-gear">
                            <path d="M 12,33 L 60,47" stroke="#111" stroke-width="2.5"/>
                            <circle cx="35" cy="40" r="9" fill="#222"/>
                            
                            <path d="M 17,55 Q 50,75 83,60" fill="none" stroke="#5D4037" stroke-width="8"/>
                            <rect x="25" y="58" width="4" height="12" fill="#FFC107" transform="rotate(-15 27 64)"/>
                            <rect x="40" y="62" width="4" height="12" fill="#FFC107" transform="rotate(-5 42 68)"/>
                            <rect x="55" y="62" width="4" height="12" fill="#FFC107" transform="rotate(5 57 68)"/>
                            <rect x="70" y="58" width="4" height="12" fill="#FFC107" transform="rotate(15 72 64)"/>
                            
                            <!-- Brokovnica -->
                            <g transform="translate(65, 45) rotate(-45)">
                                <rect x="-15" y="-3" width="18" height="8" fill="#4E342E" rx="2"/>
                                <rect x="3" y="-3" width="35" height="4" fill="#546E7A"/>
                                <rect x="3" y="2" width="35" height="4" fill="#546E7A"/>
                                <path d="M 5,6 L 5,12 L -2,12" stroke="#212121" stroke-width="2" fill="none"/>
                            </g>
                        </g>

                        <ellipse cx="10" cy="60" rx="10" ry="25" fill="var(--skin-color)" transform="rotate(20 10 60)"/>
                        <ellipse cx="90" cy="60" rx="10" ry="25" fill="var(--skin-color)" transform="rotate(-20 90 60)"/>
                        <circle cx="35" cy="40" r="5" fill="#000"/>
                        <circle cx="65" cy="40" r="5" fill="#000"/>
                        <path d="M 45,48 L 55,48 L 50,55 Z" fill="#FF9800"/>
                    </svg>
                </div>
                <h1>Tučniačik na Ľade</h1>
                <p>Zbieraj rybičky, vyhni sa snehu a stretni modrého kamoša!</p>
                <button id="start-btn">Spustiť Hru!</button>
            </div>
        </div>
        
        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div id="hud">
                <!-- LEFT bubble: Score + Level -->
                <div class="hud-bubble hud-left">
                    <span class="hud-icon">🐟</span><span id="score">0</span>
                    <span class="hud-sep"></span>
                    <span class="hud-icon">⭐</span><span id="level">1</span>
                </div>

                <!-- CENTER: Lives -->
                <div class="hud-bubble hud-center">
                    <span id="lives-hearts">❤️❤️❤️❤️❤️</span>
                </div>

                <!-- RIGHT bubble: Action buttons -->
                <div class="hud-bubble hud-right">
                    <button id="pause-btn" class="hud-btn" title="Pauza">⏸</button>
                    <div class="hud-divider"></div>
                    <button id="zombie-btn" class="hud-btn zombie-off" title="Zombie mód">🧟</button>
                </div>
            </div>
            
            <div id="game-area">
                <div id="player-penguin">
                    <svg viewBox="0 0 100 100" class="svg-penguin" style="--skin-color: #FFCA28;">
                        <ellipse cx="30" cy="90" rx="15" ry="8" fill="#FF9800"/>
                        <ellipse cx="70" cy="90" rx="15" ry="8" fill="#FF9800"/>
                        <ellipse cx="50" cy="55" rx="40" ry="45" fill="var(--skin-color)"/>
                        <ellipse cx="50" cy="65" rx="30" ry="30" fill="#FFF"/>
                        <!-- Zombie Survival Gear -->
                        <g class="zombie-gear">
                            <path d="M 12,33 L 60,47" stroke="#111" stroke-width="2.5"/>
                            <circle cx="35" cy="40" r="9" fill="#222"/>

                            <path d="M 17,55 Q 50,75 83,60" fill="none" stroke="#5D4037" stroke-width="8"/>
                            <rect x="25" y="58" width="4" height="12" fill="#FFC107" transform="rotate(-15 27 64)"/>
                            <rect x="40" y="62" width="4" height="12" fill="#FFC107" transform="rotate(-5 42 68)"/>
                            <rect x="55" y="62" width="4" height="12" fill="#FFC107" transform="rotate(5 57 68)"/>
                            <rect x="70" y="58" width="4" height="12" fill="#FFC107" transform="rotate(15 72 64)"/>

                            <!-- Brokovnica -->
                            <g transform="translate(65, 45) rotate(-45)">
                                <rect x="-15" y="-3" width="18" height="8" fill="#4E342E" rx="2"/>
                                <rect x="3" y="-3" width="35" height="4" fill="#546E7A"/>
                                <rect x="3" y="2" width="35" height="4" fill="#546E7A"/>
                                <path d="M 5,6 L 5,12 L -2,12" stroke="#212121" stroke-width="2" fill="none"/>
                            </g>
                        </g>

                        <ellipse cx="10" cy="60" rx="10" ry="25" fill="var(--skin-color)" transform="rotate(20 10 60)"/>
                        <ellipse cx="90" cy="60" rx="10" ry="25" fill="var(--skin-color)" transform="rotate(-20 90 60)"/>
                        <circle cx="35" cy="40" r="5" fill="#000"/>
                        <circle cx="65" cy="40" r="5" fill="#000"/>
                        <circle cx="37" cy="38" r="2" fill="#fff"/> <!-- Sparkle voči -->
                        <circle cx="67" cy="38" r="2" fill="#fff"/>
                        <path d="M 45,46 L 55,46 L 50,52 Z" fill="#FF9800"/>
                    </svg>
                </div>

                <!-- Mobile Touch Joystick -->
                <div id="joystick-zone" class="mobile-only">
                    <div id="joystick-base">
                        <div id="joystick-knob"></div>
                    </div>
                </div>

                <!-- Zombie Shoot Button -->
                <button id="shoot-btn" title="Strieľaj!">🔫</button>

                <!-- Weapon cooldown bar -->
                <div id="weapon-bar"><div id="weapon-bar-fill"></div></div>
            </div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <div class="game-over-content">
                <h2 id="game-over-title">Hra skončila!</h2>
                <div class="stats-box">
                    <div class="stat-item"><span>Ulovené ryby</span><span id="stat-caught" class="strong">0</span></div>
                    <div class="stat-item"><span>Ujdené</span><span id="stat-missed" class="strong">0</span></div>
                    <div class="stat-item"><span>Čas v hre</span><span class="strong"><span id="stat-time">0</span>s</span></div>
                    <div class="stat-item highlight"><span>Celkové Skóre</span><span id="final-score" class="strong">0</span></div>
                </div>
                <!-- Leaderboard -->
                <div class="leaderboard-box">
                    <h3>🏆 Top 5 Skóre</h3>
                    <ol id="leaderboard-list"></ol>
                </div>
                <button id="restart-btn">Hrať Znova</button>
            </div>
        </div>
        
        <!-- Level Up Overlay -->
        <div id="level-up-overlay" class="overlay hidden">
            <h2>Výborne! Ďalší Level!</h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
